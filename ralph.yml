# Ralph Loop Configuration - FMPL Project
# FMPL: A streaming-first DSL for building AI agents with grammars, capabilities, and durable state

# Event loop settings
event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 100
  max_runtime_seconds: 14400           # 4 hours
  idle_timeout_secs: 1800

# CLI backend settings
cli:
  backend: "opencode"
  prompt_mode: "stdin"
  args: [
    "--model", "zai-coding-plan/glm-4.7",
  ]

# Project-specific configuration for FMPL
project:
  name: "FMPL"
  description: "Streaming-first DSL for AI agents with grammars, capabilities, and durable state"
  docs_reference: "AGENTS.md"
  specs_dir: "./specs/"
  design_dir: "./docs/design/"
  plans_dir: "./docs/plans/"

# Core behaviors (always injected into prompts)
core:
  scratchpad: ".agent/scratchpad.md"
  guardrails:
    - "Fresh context each iteration - scratchpad is memory"
    - "Don't assume 'not implemented' - search first"
    - "Backpressure is law - tests/typecheck/lint must pass"
    - "Read AGENTS.md for project context before making changes"
    - "Use Indexed RPN execution model (NOT stack-based) - see fmpl-core/src/vm.rs"
    - "Write parsers in FMPL using grammar system, not Rust (except for low-level I/O)"

# Build and test commands for FMPL Rust workspace
commands:
  build: "cargo build"
  test_all: "cargo test"
  test_core: "cargo test -p fmpl-core"
  test_specific: "cargo test -p fmpl-core <test_name>"
  run_repl: "cargo run -p fmpl-cli"
  run_web: "cargo run -p fmpl-web"
  run_tui: "cargo run -p fmpl-tui"

# Documentation standards
docs:
  standards_file: "docs/STANDARDS.md"
  fixes_file: "FIXES.md"

